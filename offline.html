<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Comfort - Offline</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f2e9; color: #132033; }
    .box { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 12px 36px rgba(19,32,51,.12); width: min(560px, calc(100% - 24px)); }
    a { color: #0f766e; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Нет подключения к интернету</h1>
    <p>Часть данных доступна офлайн. Когда интернет вернется, обновите страницу.</p>
    <p><a href="./">Вернуться на главную</a></p>
  </div>
</body>
</html>
